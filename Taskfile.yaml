version: "3"

tasks:
  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  tidy:
    desc: Tidy modules
    cmds:
      - go mod tidy

  lint:
    desc: Run static checks
    cmds:
      - go vet ./...
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  check:
    desc: Run formatting, module tidy, vet, and tests
    cmds:
      - task: fmt
      - task: tidy
      - task: lint
      - task: test

  build:
    desc: Build the agentsflow CLI
    cmds:
      - go build -o ./bin/agentsflow ./cmd/agentsflow

  package:npm:
    desc: Build release binaries into npm platform packages and ./dist/artifacts
    cmds:
      - |
        set -eu
        version="{{.VERSION}}"
        case "$version" in
          ""|v*) echo "VERSION must be a semver version without a leading v" >&2; exit 2 ;;
        esac
        rm -rf ./dist/artifacts ./npm/agentsflow-*/bin
        mkdir -p ./dist/artifacts
        for package_dir in \
          ./npm/agentsflow \
          ./npm/agentsflow-darwin-arm64 \
          ./npm/agentsflow-darwin-x64 \
          ./npm/agentsflow-linux-arm64 \
          ./npm/agentsflow-linux-x64 \
          ./npm/agentsflow-win32-arm64 \
          ./npm/agentsflow-win32-x64
        do
          npm pkg set version="$version" --prefix "$package_dir"
        done
        npm pkg set \
          optionalDependencies.agentsflow-darwin-arm64="$version" \
          optionalDependencies.agentsflow-darwin-x64="$version" \
          optionalDependencies.agentsflow-linux-arm64="$version" \
          optionalDependencies.agentsflow-linux-x64="$version" \
          optionalDependencies.agentsflow-win32-arm64="$version" \
          optionalDependencies.agentsflow-win32-x64="$version" \
          --prefix ./npm/agentsflow
      - task: package:npm-platform
        vars:
          {
            VERSION: "{{.VERSION}}",
            GOOS: "darwin",
            GOARCH: "arm64",
            PACKAGE: "agentsflow-darwin-arm64",
            BINARY: "agentsflow",
            ARTIFACT: "darwin-arm64",
          }
      - task: package:npm-platform
        vars:
          {
            VERSION: "{{.VERSION}}",
            GOOS: "darwin",
            GOARCH: "amd64",
            PACKAGE: "agentsflow-darwin-x64",
            BINARY: "agentsflow",
            ARTIFACT: "darwin-x64",
          }
      - task: package:npm-platform
        vars:
          {
            VERSION: "{{.VERSION}}",
            GOOS: "linux",
            GOARCH: "arm64",
            PACKAGE: "agentsflow-linux-arm64",
            BINARY: "agentsflow",
            ARTIFACT: "linux-arm64",
          }
      - task: package:npm-platform
        vars:
          {
            VERSION: "{{.VERSION}}",
            GOOS: "linux",
            GOARCH: "amd64",
            PACKAGE: "agentsflow-linux-x64",
            BINARY: "agentsflow",
            ARTIFACT: "linux-x64",
          }
      - task: package:npm-platform
        vars:
          {
            VERSION: "{{.VERSION}}",
            GOOS: "windows",
            GOARCH: "arm64",
            PACKAGE: "agentsflow-win32-arm64",
            BINARY: "agentsflow.exe",
            ARTIFACT: "win32-arm64",
          }
      - task: package:npm-platform
        vars:
          {
            VERSION: "{{.VERSION}}",
            GOOS: "windows",
            GOARCH: "amd64",
            PACKAGE: "agentsflow-win32-x64",
            BINARY: "agentsflow.exe",
            ARTIFACT: "win32-x64",
          }
      - |
        set -eu
        cd ./dist/artifacts
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum ./*.tar.gz > checksums.txt
        else
          shasum -a 256 ./*.tar.gz > checksums.txt
        fi

  package:npm-platform:
    internal: true
    cmds:
      - |
        set -eu
        mkdir -p "./npm/{{.PACKAGE}}/bin"
        CGO_ENABLED=0 GOOS="{{.GOOS}}" GOARCH="{{.GOARCH}}" go build \
          -trimpath \
          -ldflags "-s -w -X github.com/cairon666/agentsflow/internal/cli.Version={{.VERSION}}" \
          -o "./npm/{{.PACKAGE}}/bin/{{.BINARY}}" \
          ./cmd/agentsflow
        tar -C "./npm/{{.PACKAGE}}/bin" -czf "./dist/artifacts/agentsflow_{{.VERSION}}_{{.ARTIFACT}}.tar.gz" "{{.BINARY}}"

  publish:npm:
    desc: Publish npm packages, with platform packages first
    cmds:
      - task: publish:npm:darwin-arm64
      - task: publish:npm:darwin-x64
      - task: publish:npm:linux-arm64
      - task: publish:npm:linux-x64
      - task: publish:npm:win32-arm64
      - task: publish:npm:win32-x64
      - task: publish:npm:main

  publish:npm-package:
    internal: true
    cmds:
      - |
        set -eu
        package="{{.PACKAGE}}"
        package_dir="./npm/$package"
        version="$(node -p "require('$package_dir/package.json').version")"
        if npm view "$package@$version" version >/dev/null 2>&1; then
          echo "skip $package@$version: already published"
        else
          cd "$package_dir"
          npm publish --access public
        fi

  publish:npm:darwin-arm64:
    desc: Publish agentsflow-darwin-arm64 if this version is not already published
    cmds:
      - task: publish:npm-package
        vars: { PACKAGE: "agentsflow-darwin-arm64" }

  publish:npm:darwin-x64:
    desc: Publish agentsflow-darwin-x64 if this version is not already published
    cmds:
      - task: publish:npm-package
        vars: { PACKAGE: "agentsflow-darwin-x64" }

  publish:npm:linux-arm64:
    desc: Publish agentsflow-linux-arm64 if this version is not already published
    cmds:
      - task: publish:npm-package
        vars: { PACKAGE: "agentsflow-linux-arm64" }

  publish:npm:linux-x64:
    desc: Publish agentsflow-linux-x64 if this version is not already published
    cmds:
      - task: publish:npm-package
        vars: { PACKAGE: "agentsflow-linux-x64" }

  publish:npm:win32-arm64:
    desc: Publish agentsflow-win32-arm64 if this version is not already published
    cmds:
      - task: publish:npm-package
        vars: { PACKAGE: "agentsflow-win32-arm64" }

  publish:npm:win32-x64:
    desc: Publish agentsflow-win32-x64 if this version is not already published
    cmds:
      - task: publish:npm-package
        vars: { PACKAGE: "agentsflow-win32-x64" }

  publish:npm:main:
    desc: Publish agentsflow if this version is not already published
    cmds:
      - task: publish:npm-package
        vars: { PACKAGE: "agentsflow" }
