name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release version to rebuild/publish, without leading v"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      sha: ${{ steps.release.outputs.sha }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        if: github.event_name == 'push'
        with:
          release-type: simple

  publish:
    needs: release_please
    if: github.event_name == 'workflow_dispatch' || needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || needs.release_please.outputs.version }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || needs.release_please.outputs.sha }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || needs.release_please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install npm with trusted publishing support
        run: npm install -g npm@11.5.1

      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@v3.50.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Test
        run: task test

      - name: Ensure generated formatting is committed
        run: git diff --exit-code

      - name: Build release packages
        run: task package:npm VERSION="$VERSION"

      - name: Upload GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/artifacts/* --clobber

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: task publish:npm VERSION="$VERSION"
